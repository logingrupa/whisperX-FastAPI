          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '429':
          description: Too many requests — see Retry-After header
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: Log in. Password reset is manual — please email hey@logingrupa.lv
        (AUTH-07).
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '429':
          description: Too many requests — see Retry-After header
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      description: 'Clear session + CSRF cookies. Idempotent — no-op if no session.


        Returns a brand-new Response (not the injected one) so the Set-Cookie

        deletions are emitted on the wire. Using the injected ``Response``

        parameter combined with ``return Response(...)`` discards the deletion

        headers (FastAPI ignores the injected response when an explicit one is

        returned).'
      operationId: logout_auth_logout_post
      responses:
        '204':
          description: Successful Response
        '429':
          description: Too many requests — see Retry-After header
  /auth/logout-all:
    post:
      tags:
      - Authentication
      summary: Logout All
      description: 'POST /auth/logout-all — bump token_version + clear cookies. AUTH-06.


        Invalidates every JWT issued for this user (including the caller''s own

        cookie) by bumping ``users.token_version``. The next middleware ver-check

        401s any outstanding session (T-15-03). Cookie clearing is for client UX

        — the JWTs are already dead server-side. Mirrors /auth/logout''s

        fresh-Response pattern (T-15-04 — see logout above for rationale).'
      operationId: logout_all_auth_logout_all_post
      responses:
        '204':
          description: Successful Response
        '429':
          description: Too many requests — see Retry-After header
  /api/keys:
    get:
      tags:
      - API Keys
      summary: List Keys
      description: List all keys (active + revoked) for the authenticated user.
      operationId: list_keys_api_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ListKeyItem'
                type: array
                title: Response List Keys Api Keys Get
