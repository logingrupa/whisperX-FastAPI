        \ Diarization parameters.\n    asr_options_params (ASROptions): ASR options\
        \ parameters.\n    vad_options_params (VADOptions): VAD options parameters.\n\
        \    file (UploadFile): Uploaded audio file.\n    callback_url (str | None):\
        \ Optional URL to call back when processing is complete.\n    repository (ITaskRepository):\
        \ Task repository dependency.\n    file_service (FileService): File service\
        \ dependency.\n\nReturns:\n    Response: Confirmation message of task queuing."
