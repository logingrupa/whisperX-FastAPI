      operationId: liveness_check_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/ready:
    get:
      tags:
      - Health
      summary: Readiness check
      description: 'Check if the application is ready to accept requests.


        Verifies dependencies like the database are connected and ready.

        Returns HTTP 200 if all systems are operational, HTTP 503 if any dependency

        has failed.'
      operationId: readiness_check_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
