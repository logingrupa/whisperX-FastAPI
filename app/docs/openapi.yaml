openapi: 3.1.0
info:
  title: whisperX REST service
  description: "\n    # whisperX RESTful API\n\n    Welcome to the whisperX RESTful\
    \ API! This API provides a suite of audio processing services to enhance and analyze\
    \ your audio content.\n\n    ## Documentation:\n\n    For detailed information\
    \ on request and response formats, consult the [WhisperX Documentation](https://github.com/m-bain/whisperX).\n\
    \n    ## Services:\n\n    Speech-2-Text provides a suite of audio processing services\
    \ to enhance and analyze your audio content. The following services are available:\n\
    \n    1. Transcribe: Transcribe an audio/video  file into text.\n    2. Align:\
    \ Align the transcript to the audio/video file.\n    3. Diarize: Diarize an audio/video\
    \ file into speakers.\n    4. Combine Transcript and Diarization: Combine the\
    \ transcript and diarization results.\n\n    ## Supported file extensions:\n \
    \   AUDIO_EXTENSIONS = {'.ogg', '.m4a', '.amr', '.mp3', '.awb', '.wma', '.oga',\
    \ '.wav', '.aac'}\n\n    VIDEO_EXTENSIONS = {'.avi', '.mov', '.mkv', '.wmv', '.mp4'}\n\
    \n    ## Language-Specific Model Overrides:\n\n    Some languages have fine-tuned\
    \ models that are automatically used when that language is selected.\n    The\
    \ server-side `LANGUAGE_MODEL_OVERRIDES` configuration maps language codes to\
    \ optimized CTranslate2\n    model paths. When an override is configured, the\
    \ `model` parameter is ignored for that language and\n    the fine-tuned model\
    \ is loaded instead.\n\n    Currently configured overrides:\n    - **`lv` (Latvian)**:\
    \ Uses `AiLab-IMCS-UL/whisper-large-v3-lv-late-cv19` (CTranslate2 int8) —\n  \
    \    a fine-tuned Whisper Large V3 with ~3.2% WER vs ~19.2% WER for stock Whisper\
    \ on Latvian.\n\n    "
  version: 0.0.1
paths:
  /speech-to-text:
