  /task/all:
    get:
      tags:
      - Tasks Management
      summary: Get All Tasks Status
      description: "Retrieve a paginated, optionally filtered list of tasks (Plan\
        \ 15-ux).\n\nPagination + search is server-side so the queue can scale beyond\
        \ a few\nhundred rows without dragging the whole table to the browser. The\n\
        user-scope filter (Phase 13-07) still applies — callers see only their\nown\
        \ tasks.\n\nArgs:\n    q: Case-insensitive substring match against file_name.\n\
        \    status: Exact-match status filter (processing|completed|failed).\n  \
        \  page: 1-indexed page number; Pydantic ``ge=1`` rejects 0/negatives.\n \
        \   page_size: Items per page, 1..200; out-of-range -> 422.\n    service:\
        \ Task management service dependency (scoped to caller).\n\nReturns:\n   \
        \ TaskListResponse: ``{tasks, total, page, page_size}``."
      operationId: get_all_tasks_status_task_all_get
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          description: Substring match against file_name (case-insensitive)
          title: Q
        description: Substring match against file_name (case-insensitive)
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 32
          - type: 'null'
          description: Filter by task status (processing|completed|failed)
          title: Status
        description: Filter by task status (processing|completed|failed)
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number (1-indexed)
          default: 1
          title: Page
        description: Page number (1-indexed)
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Items per page (1..200)
          default: 50
          title: Page Size
        description: Items per page (1..200)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
