      description: Soft-delete (revoke) an API key. Cross-user requests return 404
        opaque.
      operationId: revoke_key_api_keys__key_id__delete
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: integer
          title: Key Id
      responses:
