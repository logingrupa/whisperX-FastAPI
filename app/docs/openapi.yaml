  /api/account/data:
    delete:
      tags:
      - Account
      summary: Delete User Data
      description: Delete the caller's tasks + uploaded files. User row preserved.
      operationId: delete_user_data_api_account_data_delete
      responses:
        '204':
          description: Successful Response
  /api/account/me:
    get:
      tags:
      - Account
      summary: Get Account Me
      description: 'GET /api/account/me — return account summary for client hydration
        (UI-07).


        Anti-enumeration design (WR-03 — deliberate, NOT a missing 404):

        AccountService.get_account_summary raises InvalidCredentialsError

        when the users row is gone (race-condition self-delete or admin

        purge). The global exception handler maps this to HTTP 401, which

        is intentionally indistinguishable from session-expired from the

        client''s perspective.


        Frontend contract: ``fetchAccountSummary`` sets ``suppress401Redirect``,

        so apiClient throws AuthRequiredError; ``authStore.refresh()`` catches

        it and silently clears the user. Effect: a stale-session client sees

        a sign-out instead of a "your row vanished" error — uniform with

        every other 401 surface (T-15-05). Future maintainers: do NOT

        "improve" this to 404, you would re-introduce the enumeration leak.'
      operationId: get_account_me_api_account_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummaryResponse'
  /api/account:
    delete:
      tags:
      - Account
      summary: Delete Account
      description: 'DELETE /api/account — cascade delete + clear cookies. SCOPE-06.


        Body: ``{email_confirm: EmailStr}`` — case-insensitive match against

        ``request.state.user.email`` enforced by AccountService.delete_account.


        Mismatched email → 400 EMAIL_CONFIRM_MISMATCH (locked contract per

        CONTEXT D-RES). Service-layer ValidationError is re-raised as 400 here

        rather than letting it surface as the global handler default of 422 —

        route-local translation keeps other ValidationError sites unaffected.


        Cookie-clearing pattern (T-15-04): build a NEW Response(204) and call

        ``clear_auth_cookies`` on it; never reuse a Depends-injected Response,

        or FastAPI drops the Set-Cookie deletions.'
      operationId: delete_account_api_account_delete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /billing/checkout:
    post:
      tags:
      - Billing
      summary: Checkout Stub
      description: Return 501 stub — actual Stripe Checkout in v1.3.
      operationId: checkout_stub_billing_checkout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
        required: true
      responses:
        '501':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /billing/webhook:
    post:
      tags:
      - Billing
      summary: Webhook Stub
      description: 'Validate Stripe-Signature header schema (rejects malformed); return
        501.


        Webhook stub does NOT require auth (Stripe calls it server-to-server)

        and is exempt from CSRF (server-to-server has no browser cookie). Real

        HMAC signature verification arrives in v1.3.'
      operationId: webhook_stub_billing_webhook_post
      parameters:
      - name: Stripe-Signature
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Stripe-Signature
      responses:
        '501':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ws/ticket:
    post:
      tags:
      - WebSocket
      summary: Issue Ticket
      description: 'Issue a single-use 60-second WS ticket for the caller''s own task.


        Cross-user task ids return ``404`` with the same opaque body as

        "task not found" — no enumeration of foreign tasks (T-13-24, MID-07).


        Plan 13-07: repository is now ``get_scoped_task_repository`` — the

        scoped query already returns None for cross-user task ids, so the

        first ``task is None`` guard catches the cross-user path. The manual

        ``task.user_id != user.id`` check below remains as defence-in-depth

        (catches drift if a task''s user_id is mutated post-issue, MID-07).'
      operationId: issue_ticket_api_ws_ticket_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      tags:
      - Health
      summary: Simple health check
      description: 'Verify the service is up and running.


        Returns a simple status response to confirm the API service is operational.'
      operationId: health_check_health_get
